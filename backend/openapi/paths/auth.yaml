# Auth endpoints.

register:
  post:
    tags: [Auth]
    summary: Register a new account
    operationId: register
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                example: Jane Doe
              email:
                type: string
                format: email
                example: jane@example.com
              phone:
                type: string
                example: "+60123456789"
              password:
                type: string
                format: password
                minLength: 8
                example: Password1
            required: [name, email, phone, password]
    responses:
      "201":
        description: Account created
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Registration successful
                user:
                  $ref: ../components/schemas.yaml#/UserDTO
              required: [message, user]
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/Error
      "409":
        description: Email already in use
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/Error

login:
  post:
    tags: [Auth]
    summary: Sign in
    operationId: login
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              email:
                type: string
                format: email
                example: jane@example.com
              password:
                type: string
                format: password
                example: Password1
            required: [email, password]
    responses:
      "200":
        description: Login successful
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Login successful
                accessToken:
                  type: string
                  description: JWT bearer token
                user:
                  $ref: ../components/schemas.yaml#/UserDTO
              required: [message, accessToken, user]
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/Error
      "401":
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/Error

logout:
  post:
    tags: [Auth]
    summary: Sign out
    operationId: logout
    security:
      - BearerAuth: []
    responses:
      "200":
        description: Logout successful
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Logout successful
              required: [message]

me:
  get:
    tags: [Auth]
    summary: Get current user profile
    operationId: getMe
    security:
      - BearerAuth: []
    responses:
      "200":
        description: Current user
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  $ref: ../components/schemas.yaml#/UserDTO
              required: [user]
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: ../openapi.yaml#/components/schemas/Error
